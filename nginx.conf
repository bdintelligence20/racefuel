server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache HTML — always fetch fresh so clients pick up new asset hashes immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # Hashed assets never change — cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Service worker must never be cached — updates need to propagate
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
    }

    # SPA fallback — everything else serves index.html (with no-cache)
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
